{% extends "layout_default.html" %}

{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="panel panel-default">
            <div class="panel-heading"><h4>Upload Certificate</h4></div>
            <div class="panel-body">
                <form method="post" action="/certs/create">

                    <div class="form-group">
                        <label>Certificate Name</label>
                        <input type="text" class="form-control" name="name" placeholder="mysite" required>
                    </div>

                    <div class="form-group">
                        <label>Certificate (PEM)</label>
                        <textarea class="form-control" name="cert" rows="10"
                                  placeholder="-----BEGIN CERTIFICATE-----&#10;...&#10;-----END CERTIFICATE-----"
                                  required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Private Key (PEM)</label>
                        <textarea class="form-control" name="key" rows="10"
                                  placeholder="-----BEGIN PRIVATE KEY-----&#10;...&#10;-----END PRIVATE KEY-----"
                                  required></textarea>
                    </div>

                    <button type="submit" class="btn btn-success">
                        <i class="fa fa-upload"></i> Upload Certificate
                    </button>
                    <a href="/certs" class="btn btn-default">Cancel</a>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
