{% extends "layout_default.html" %}

{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="panel panel-default">
            <div class="panel-heading"><h4>Create Security Policy</h4></div>
            <div class="panel-body">
                <form method="post" action="/policy/create">

                    <div class="form-group">
                        <label>Policy Name</label>
                        <input type="text" class="form-control" name="name"
                               placeholder="my-policy" required>
                    </div>

                    <div class="form-group">
                        <label>Rule Engine Mode</label>
                        <select class="form-control" name="rule_engine">
                            <option value="DetectionOnly">DetectionOnly — log alerts, never block</option>
                            <option value="On">On — enforce rules, block when threshold exceeded</option>
                            <option value="Off">Off — WAF disabled for this policy</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Score Threshold
                            <small class="text-muted">
                                (block request when accumulated rule scores reach this value)
                            </small>
                        </label>
                        <input type="number" class="form-control" name="score_threshold"
                               value="10" min="1" max="1000" required>
                    </div>

                    <button type="submit" class="btn btn-success">
                        <i class="fa fa-save"></i> Create Policy
                    </button>
                    <a href="/policy" class="btn btn-default">Cancel</a>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
