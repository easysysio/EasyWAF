{% extends "layout_default.html" %}

{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="panel panel-default">
            <div class="panel-heading"><h4>Policy Settings — {{ policy.name }}</h4></div>
            <div class="panel-body">
                <form method="post" action="/policy/{{ policy.name }}/update">

                    <div class="form-group">
                        <label>Policy Name</label>
                        <input type="text" class="form-control" value="{{ policy.name }}" disabled>
                    </div>

                    <div class="form-group">
                        <label>Rule Engine Mode</label>
                        <select class="form-control" name="rule_engine">
                            <option value="DetectionOnly"
                                {% if policy.rule_engine == "DetectionOnly" %}selected{% endif %}>
                                DetectionOnly — log alerts, never block
                            </option>
                            <option value="On"
                                {% if policy.rule_engine == "On" %}selected{% endif %}>
                                On — enforce rules, block when threshold exceeded
                            </option>
                            <option value="Off"
                                {% if policy.rule_engine == "Off" %}selected{% endif %}>
                                Off — WAF disabled for this policy
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Score Threshold
                            <small class="text-muted">
                                (block request when accumulated rule scores reach this value)
                            </small>
                        </label>
                        <input type="number" class="form-control" name="score_threshold"
                               value="{{ policy.score_threshold }}" min="1" max="1000" required>
                    </div>

                    <button type="submit" class="btn btn-success">
                        <i class="fa fa-save"></i> Update Policy
                    </button>
                    <a href="/policy" class="btn btn-default">Cancel</a>

                </form>

                <hr>

                <a href="/policy/{{ policy.name }}/rules" class="btn btn-primary">
                    <i class="fa fa-shield"></i> Manage WAF Rules
                </a>

            </div>
        </div>
    </div>
</div>
{% endblock %}
