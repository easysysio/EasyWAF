{% extends "layout_default.html" %}

{% block content %}

<!-- Summary cards -->
<div class="row">

    <div class="col-lg-3 col-md-6">
        <div class="panel panel-green">
            <div class="panel-heading">
                <div class="row">
                    <div class="col-xs-3"><i class="fa fa-globe fa-5x"></i></div>
                    <div class="col-xs-9 text-right">
                        <div class="huge">{{ sites_number }}</div>
                        <div>Sites</div>
                    </div>
                </div>
            </div>
            <a href="/sites">
                <div class="panel-footer">
                    <span class="pull-left">View Details</span>
                    <span class="pull-right"><i class="fa fa-arrow-circle-right"></i></span>
                    <div class="clearfix"></div>
                </div>
            </a>
        </div>
    </div>

    <div class="col-lg-3 col-md-6">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <div class="row">
                    <div class="col-xs-3"><i class="fa fa-certificate fa-5x"></i></div>
                    <div class="col-xs-9 text-right">
                        <div class="huge">{{ certs_number }}</div>
                        <div>Certificates</div>
                    </div>
                </div>
            </div>
            <a href="/certs">
                <div class="panel-footer">
                    <span class="pull-left">View Details</span>
                    <span class="pull-right"><i class="fa fa-arrow-circle-right"></i></span>
                    <div class="clearfix"></div>
                </div>
            </a>
        </div>
    </div>

    <div class="col-lg-3 col-md-6">
        <div class="panel panel-red">
            <div class="panel-heading">
                <div class="row">
                    <div class="col-xs-3"><i class="fa fa-shield fa-5x"></i></div>
                    <div class="col-xs-9 text-right">
                        <div class="huge">{{ policy_number }}</div>
                        <div>Security Policies</div>
                    </div>
                </div>
            </div>
            <a href="/policy">
                <div class="panel-footer">
                    <span class="pull-left">View Details</span>
                    <span class="pull-right"><i class="fa fa-arrow-circle-right"></i></span>
                    <div class="clearfix"></div>
                </div>
            </a>
        </div>
    </div>

</div>
<!-- /.row -->

{% endblock %}
